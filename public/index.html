<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>URL Shortener</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 400px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    #result {
      margin-top: 15px;
      word-break: break-all;
      color: white;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>🔗 URL Shortener</h2>

    <input id="url" placeholder="Colle ton URL" />
    <input id="custom" placeholder="Lien personnalisé (optionnel)" />

    <button onclick="shorten()">Raccourcir</button>

    <p id="result"></p>
  </div>

  <script>
    async function shorten() {
      const originalUrl = document.getElementById("url").value;
      const customCode = document.getElementById("custom").value;

      const res = await fetch("/shorten", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ originalUrl, customCode })
      });

      const data = await res.json();

      if (data.shortUrl) {
        document.getElementById("result").innerHTML =
          "✔️ Lien : <a href='" + data.shortUrl + "' target='_blank'>" + data.shortUrl + "</a>";
      } else {
        document.getElementById("result").innerText = "Erreur";
      }
    }
  </script>
</body>
</html>
